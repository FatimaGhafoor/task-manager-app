<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="login-section">
      <h2>Login</h2>
      <form id="login-form">
        <input
          type="text"
          id="login-username"
          placeholder="Username"
          required
        />
        <input
          type="password"
          id="login-password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>
    </div>

    <div id="app-section" class="hidden">
      <button id="logout-btn">Logout</button>
      <h1>Task Manager</h1>
      <h1>Task Manager</h1>
      <div id="loading-spinner" class="hidden">Loading...</div>

      <h2>Add New Task</h2>
      <form id="task-form">
        <input type="text" id="task-title" placeholder="Task title" required />

        <select id="task-status">
          <option value="todo">Todo</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>

        <select id="task-priority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <input type="date" id="task-due-date" required />

        <button type="submit">Add Task</button>
      </form>

      <input
        type="text"
        id="search-input"
        placeholder="Search tasks by title..."
      />

      <select id="status-filter">
        <option value="all">All</option>
        <option value="todo">Todo</option>
        <option value="in-progress">In Progress</option>
        <option value="done">Done</option>
      </select>

      <table id="tasks-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Status</th>
            <th class="sortable" data-field="priority">
              Priority<span class="sort-icon"></span>
            </th>
            <th class="sortable" data-field="dueDate">
              Due Date<span class="sort-icon"></span>
            </th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tasks-table-body"></tbody>
      </table>
      <div id="empty-state" class="hidden">No tasks found.</div>

      <div id="pagination-controls"></div>
    </div>
    <div id="toast-container"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
